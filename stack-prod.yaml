networks:
  klaviyo-prod:
    driver: bridge

services:
  klaviyo-etl:
    container_name: klaviyo-etl-prod
    image: gdelapierre/klaviyo-etl:1.0.0
    environment:
      # Klaviyo
      - KLAVIYO_API_KEY=${KLAVIYO_API_KEY}
      - KLAVIYO_API_REVISION=${KLAVIYO_API_REVISION:-2026-04-15}
      - KLAVIYO_TIMEZONE=${KLAVIYO_TIMEZONE:-Australia/Brisbane}
      - KLAVIYO_CONVERSION_METRIC_ID=${KLAVIYO_CONVERSION_METRIC_ID}
      - KLAVIYO_API_MAX_RETRIES=${KLAVIYO_API_MAX_RETRIES:-3}
      - KLAVIYO_API_RETRY_DELAY_BASE=${KLAVIYO_API_RETRY_DELAY_BASE:-2000}
      # PostgreSQL
      - PGHOST=${PGHOST}
      - PGPORT=${PGPORT:-5000}
      - PGDATABASE=${PGDATABASE}
      - PGUSER=${PGUSER}
      - PGPASSWORD=${PGPASSWORD}
      - PGSSLMODE=${PGSSLMODE:-require}
      - PGSSL_REJECT_UNAUTHORIZED=${PGSSL_REJECT_UNAUTHORIZED:-true}
      - PGSSLROOTCERT=${PGSSLROOTCERT}
      # Database initialisation
      - RUN_DB_INIT=${RUN_DB_INIT:-false}
      - DB_ADMIN_USER=${DB_ADMIN_USER:-dbadmin}
      - DB_ADMIN_PASSWORD=${DB_ADMIN_PASSWORD}
      - DB_ADMIN_DB=${DB_ADMIN_DB:-postgres}
      - DB_LOADER_PASSWORD=${DB_LOADER_PASSWORD}
      # ETL scheduler
      - ETL_SCHEDULE=${ETL_SCHEDULE:-0 2 * * *}
      - BACKFILL_MONTHS=${BACKFILL_MONTHS:-12}
      - RUN_ON_STARTUP=${RUN_ON_STARTUP:-true}
      - ETL_PORT=3002
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - TZ=${TZ:-Australia/Brisbane}
    volumes:
      - /data/compose/cacerts/dlplab-root-ca.pem:/etc/ssl/dlplab-root-ca.pem:ro
    restart: unless-stopped
    networks:
      - klaviyo-prod
